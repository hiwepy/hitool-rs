name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace
      - run: cargo test --workspace --no-default-features
      - run: cargo test --workspace --all-features
      - run: cargo check --manifest-path fuzz/Cargo.toml
      - run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  coverage:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: hitool
          POSTGRES_USER: hitool
          POSTGRES_PASSWORD: hitool
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hitool -d hitool"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: hitool
          MYSQL_ROOT_PASSWORD: hitool
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -phitool"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - run: >-
          cargo llvm-cov --workspace --all-features
          --fail-under-lines 100
          --fail-under-regions 100
          --fail-under-functions 100
        env:
          HITOOL_TEST_POSTGRES_URL: postgres://hitool:hitool@127.0.0.1:5432/hitool
          HITOOL_TEST_MYSQL_URL: mysql://root:hitool@127.0.0.1:3306/hitool

  platforms:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - run: sudo apt-get update && sudo apt-get install --yes musl-tools
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-features --target x86_64-unknown-linux-musl

  nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-features --locked

  features:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-hack
      - uses: Swatinem/rust-cache@v2
      - run: cargo hack check --workspace --each-feature --locked

  database-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: hitool
          POSTGRES_USER: hitool
          POSTGRES_PASSWORD: hitool
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hitool -d hitool"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: hitool
          MYSQL_ROOT_PASSWORD: hitool
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -phitool"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p hitool-db --all-features
        env:
          HITOOL_TEST_POSTGRES_URL: postgres://hitool:hitool@127.0.0.1:5432/hitool
          HITOOL_TEST_MYSQL_URL: mysql://root:hitool@127.0.0.1:3306/hitool

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  semver:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-semver-checks
      - run: cargo semver-checks check-release --workspace
